kind = "web"
previewPath = "/"
title = "IronLog"
version = "1.0.0"
id = "artifacts/ironlog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23203

[services.development]
run = "pnpm --filter @workspace/ironlog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ironlog", "run", "build" ]
publicDir = "artifacts/ironlog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23203"
BASE_PATH = "/"
